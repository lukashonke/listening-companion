app = "listening-companion"
primary_region = "ams"

[build]

[env]
  PORT = "8000"
  FRONTEND_DIST = "/app/frontend/dist"
  DATABASE_PATH = "/data/listening_companion.db"

[mounts]
  source = "listening_companion_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "10s"
    method = "get"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
