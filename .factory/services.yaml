commands:
  install_backend: cd backend && uv sync
  install_frontend: cd frontend && npm install
  test_backend: cd backend && uv run pytest -x -v
  test_frontend: cd frontend && npm run test:run
  build_frontend: cd frontend && npm run build
  lint_frontend: cd frontend && npm run lint
  deploy: railway up --detach

services:
  backend:
    start: cd backend && uv run uvicorn main:app --reload --host 0.0.0.0 --port 8000
    stop: lsof -ti :8000 | xargs kill -9 2>/dev/null || true
    healthcheck: curl -sf http://localhost:8000/health
    port: 8000
    depends_on: []

  frontend:
    start: cd frontend && npm run dev -- --port 5173
    stop: lsof -ti :5173 | xargs kill -9 2>/dev/null || true
    healthcheck: curl -sf http://localhost:5173
    port: 5173
    depends_on: [backend]
